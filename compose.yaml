# https://docs.docker.com/compose/compose-file/
name: pantheon

services:
    pantheon-db:
        container_name: pantheon-db
        image: postgres:18

        ports:
            - ${DB_PORT}

        environment:
            - POSTGRES_PASSWORD=${DB_PASSWORD}
            - POSTGRES_USER=${DB_USER}
            - POSTGRES_DB=${DB_NAME}

        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
            interval: 10s
            retries: 5
            start_period: 30s
            timeout: 10s

        volumes:
            - pgdata:/var/lib/postgresql

    pantheon-api:
        container_name: pantheon-api
        build: .
        env_file: .env
        restart: ${RESTART_POLICY}
        mem_limit: ${HARD_MEMORY_LIMIT}
        mem_reservation: ${SOFT_MEMORY_LIMIT}

        ports:
            - ${API_PORT}

        depends_on:
            pantheon-db:
                condition: service_healthy
                restart: true

        volumes:
            - $PWD/assets:/usr/src/app/assets

        environment:
            # localhost (or whatever PostgresSQL's address actually is) cannot
            # be addressed directly from inside a container, instead we address
            # its container name.
            - DB_HOST=pantheon-db
            - GIT_COMMIT_HASH=${GIT_COMMIT_HASH}

volumes:
    pgdata:
        name: pantheon-database
